<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Worker - Informar Código OTP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    
    h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
    }
    
    .subtitle {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
    }
    
    .info-box {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 25px;
      border-radius: 4px;
    }
    
    .info-box p {
      color: #555;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    
    .info-box p:last-child {
      margin-bottom: 0;
    }
    
    .info-box strong {
      color: #333;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    input[name="code"] {
      font-size: 24px;
      text-align: center;
      letter-spacing: 8px;
      font-weight: 600;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
      display: none;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .emoji {
      font-size: 48px;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🔐</div>
    <h1>Código OTP</h1>
    <p class="subtitle">Portal Worker - iGreen Energy</p>
    
    <div class="info-box">
      <p><strong>📱 Instruções:</strong></p>
      <p>1. Pergunte ao cliente qual código ele recebeu no WhatsApp</p>
      <p>2. Digite o código de 6 dígitos abaixo</p>
      <p>3. Clique em "Enviar Código"</p>
      <p>4. A automação continuará automaticamente</p>
    </div>
    
    <form id="otpForm">
      <div class="form-group">
        <label for="customer_id">ID do Cliente:</label>
        <input 
          type="text" 
          id="customer_id" 
          name="customer_id" 
          placeholder="uuid-do-cliente"
          required
        >
      </div>
      
      <div class="form-group">
        <label for="code">Código OTP (6 dígitos):</label>
        <input 
          type="text" 
          id="code" 
          name="code" 
          placeholder="123456"
          maxlength="6"
          pattern="[0-9]{6}"
          required
        >
      </div>
      
      <button type="submit" id="submitBtn">Enviar Código</button>
    </form>
    
    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById('otpForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');
    const codeInput = document.getElementById('code');
    
    // Auto-focus no campo de código
    codeInput.focus();
    
    // Permite apenas números no campo de código
    codeInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '');
    });
    
    // Pega customer_id da URL se fornecido (?customer_id=xxx)
    const urlParams = new URLSearchParams(window.location.search);
    const customerIdParam = urlParams.get('customer_id');
    if (customerIdParam) {
      document.getElementById('customer_id').value = customerIdParam;
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const customerId = document.getElementById('customer_id').value.trim();
      const code = document.getElementById('code').value.trim();
      
      if (!customerId || !code) {
        showMessage('Por favor, preencha todos os campos', 'error');
        return;
      }
      
      if (code.length !== 6) {
        showMessage('O código deve ter 6 dígitos', 'error');
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.textContent = 'Enviando...';
      
      try {
        const response = await fetch('/otp', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            customer_id: customerId,
            code: code
          })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          showMessage('✅ Código enviado com sucesso! A automação continuará.', 'success');
          form.reset();
          
          // Se tinha customer_id na URL, mantém
          if (customerIdParam) {
            document.getElementById('customer_id').value = customerIdParam;
          }
          
          codeInput.focus();
        } else {
          showMessage('❌ Erro: ' + (data.error || 'Falha ao enviar código'), 'error');
        }
      } catch (error) {
        showMessage('❌ Erro de conexão: ' + error.message, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Enviar Código';
      }
    });
    
    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = 'message ' + type;
      messageDiv.style.display = 'block';
      
      setTimeout(() => {
        messageDiv.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
